  'scrap_approval',     // 报废审批
  'lifecycle_event',    // 全生命周期事件流水
];

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => { db = req.result; resolve(db); };
    req.onupgradeneeded = (e) => {
      const _db = e.target.result;
      TABLES.forEach(t => {
        if (!_db.objectStoreNames.contains(t)) {
          _db.createObjectStore(t, { keyPath: 'id' });
        }
      });
    };
  });
}

const dbApi = {
  insert(table, row) {
    return new Promise((res, rej) => {
      const tx = db.transaction(table, 'readwrite');
      tx.objectStore(table).put(row);
      tx.oncomplete = () => res(row);
      tx.onerror = () => rej(tx.error);
    });
  },
  bulkInsert(table, rows) {
    return new Promise((res, rej) => {
      const tx = db.transaction(table, 'readwrite');
      const store = tx.objectStore(table);
      rows.forEach(r => store.put(r));
      tx.oncomplete = () => res(rows.length);
      tx.onerror = () => rej(tx.error);
    });
  },
  update(table, row) { return this.insert(table, row); },
  delete(table, id) {
    return new Promise((res, rej) => {
      const tx = db.transaction(table, 'readwrite');
      tx.objectStore(table).delete(id);
      tx.oncomplete = () => res();
      tx.onerror = () => rej(tx.error);
    });
  },
  get(table, id) {
    return new Promise((res, rej) => {
      const tx = db.transaction(table, 'readonly');
      const r = tx.objectStore(table).get(id);
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
  },
  all(table) {
    return new Promise((res, rej) => {
      const tx = db.transaction(table, 'readonly');
      const r = tx.objectStore(table).getAll();
      r.onsuccess = () => res(r.result || []);
      r.onerror = () => rej(r.error);
    });
  },
  async query(table, filter) {
    const list = await this.all(table);
    return filter ? list.filter(filter) : list;
  },
  count(table) {
    return new Promise((res, rej) => {
      const tx = db.transaction(table, 'readonly');
      const r = tx.objectStore(table).count();
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
  }
};

  await dbApi.bulkInsert('scrap_decision', scrapDecisions);

  // 14. 全生命周期事件流水（核心：体现"全生命周期"）
  const events = [];

  devices.forEach(d => {

// ==================== 业务服务层（真实统计计算） ====================
const services = {
  async getConfig(key, defaultVal) {
    const c = await dbApi.get('sys_config', key);
    return c ? Number(c.config_value) : defaultVal;
  },

  // 当前估计残值（直线折旧 × 市场折扣）
  async calcResidual(device) {
    const mktDisc = await this.getConfig('market_discount_ratio', 0.80);
    const usedYears = (Date.now() - new Date(device.in_use_date)) / (365.25 * 86400000);
    const designLife = Math.max(1, device.design_life_years || 1);
    const ratio = Math.max(0, 1 - usedYears / designLife);
    return device.purchase_cost * ratio * mktDisc;
  },

  async calcUsedYears(device) {
    return (Date.now() - new Date(device.in_use_date)) / (365.25 * 86400000);
  },

  // TCO 决策（论文核心算法 — 阈值前置 + 双方案对比）
  async tcoDecision(deviceId, targetYears, repairEstimate) {
    const device = await dbApi.get('device_archive', deviceId);
    if (!device) throw new Error('设备不存在');
    if (!device.purchase_cost || !device.in_use_date) throw new Error('档案信息不全');

    const thr      = await this.getConfig('repair_residual_threshold', 0.55);
    const mktDisc  = await this.getConfig('market_discount_ratio',     0.80);
    const lifeWarn = await this.getConfig('life_warning_ratio',        0.80);

    const usedYears = await this.calcUsedYears(device);
    const designLife = Math.max(1, device.design_life_years);
    const ratio = Math.max(0, 1 - usedYears / designLife);
    const residual = device.purchase_cost * ratio * mktDisc;

    const result = {
      device_name: device.device_name,
      device_code: device.device_code,
      used_years: usedYears.toFixed(2),
      design_life: designLife,
      life_ratio: (usedYears / designLife * 100).toFixed(1),
      current_residual: Math.round(residual * 100) / 100,
      threshold: thr,
      market_discount: mktDisc,
      life_warning: lifeWarn,
      repair_estimate: repairEstimate,
      target_years: targetYears,
    };

    // 阈值前置判断
    if (repairEstimate > residual * thr) {
      result.threshold_triggered = true;
      result.recommendation = `建议报废（修复费 ${fmtMoney(repairEstimate)} > 残值 ${fmtMoney(residual)} × ${(thr*100).toFixed(0)}%）`;
      result.recommendation_short = '建议报废';
      return result;
    }

    result.threshold_triggered = false;

    // 修复方案 TCO
    const annualOpCost = (device.annual_maintain_cost || 0) + (device.annual_repair_cost || 0);
    const tcoRepair = repairEstimate + annualOpCost * targetYears;
    result.tco_repair = Math.round(tcoRepair * 100) / 100;

    // 更换方案 TCO
    const newPrice = device.purchase_cost;
    const tcoReplace = newPrice + (device.annual_maintain_cost || 0) * designLife - residual;
    result.tco_replace = Math.round(tcoReplace * 100) / 100;

    const diff = tcoRepair - tcoReplace;
    result.saving_diff = Math.round(diff * 100) / 100;

    // 寿命警戒线
    if (usedYears / designLife >= lifeWarn) {
      result.recommendation = '建议更换：设备已超过寿命警戒线（'+(lifeWarn*100).toFixed(0)+'%）';
      result.recommendation_short = '建议更换';
    } else if (diff > 0) {
      result.recommendation = '建议更换：经济性更优（节省 '+fmtMoney(diff)+'）';
      result.recommendation_short = '建议更换';
    } else {
      result.recommendation = '建议继续维修（修复方案更经济，节省 '+fmtMoney(-diff)+'）';
      result.recommendation_short = '建议维修';
    }
    return result;
  },

  // 真实统计：首页仪表盘
  async dashboardSummary() {
    const devices = await dbApi.all('device_archive');
    const activeDevices = devices.filter(d => !d.is_deleted && d.status !== 'scrapped');
    const inUse = activeDevices.filter(d => d.status === 'in_use').length;

    const faults = await dbApi.all('fault_order');
    const today_d = new Date(today());
    const monthStart = new Date(today_d.getFullYear(), today_d.getMonth(), 1).toISOString().slice(0,10);
    const monthFaults = faults.filter(f => f.report_date >= monthStart).length;

    // 待办：超期保养、待审批的报废、待处理工单
    const overdueMaintain = activeDevices.filter(d =>
      d.next_maintain_date && d.next_maintain_date < today() && d.status === 'in_use'
    ).length;
    const pendingScrap = (await dbApi.all('scrap_decision')).filter(s => s.status === 'pending').length;
    const pendingFaults = faults.filter(f => f.status === 'pending').length;

    // 状态分布
    const statusDist = {};
    devices.filter(d => !d.is_deleted).forEach(d => {
      statusDist[d.status] = (statusDist[d.status] || 0) + 1;
    });

    // 近 30 天费用趋势（按天聚合）
    const trends = {};
    for (let i = 0; i < 30; i++) {
      const d = addDays(today(), -29 + i);
      trends[d] = { date: d, maintain: 0, repair: 0 };
    }
    const records = await dbApi.all('maintain_record');
    records.forEach(r => {
      if (trends[r.record_date]) trends[r.record_date].maintain += r.actual_cost || 0;
    });
    faults.filter(f=>f.status==='closed' && f.close_date).forEach(f => {
      if (trends[f.close_date]) trends[f.close_date].repair += f.repair_cost || 0;
    });

    return {
      totalDevices: activeDevices.length,
      inUseDevices: inUse,
      monthFaults,
      pendingTotal: overdueMaintain + pendingScrap + pendingFaults,
      overdueMaintain, pendingScrap, pendingFaults,
      statusDist,
      trends: Object.values(trends),
    };
  },

  // 真实统计：分类分布、费用趋势、故障率、TCO 对比
  async statsOverview(daysBack = 365) {
    const devices = await dbApi.all('device_archive');
    const records = await dbApi.all('maintain_record');
    const faults = await dbApi.all('fault_order');
    const purchases = await dbApi.all('purchase_order');

    const startDate = addDays(today(), -daysBack);
    const recsInRange = records.filter(r => r.record_date >= startDate);
    const faultsInRange = faults.filter(f => f.report_date >= startDate);

    // 1. 分类分布
    const categoryCount = {};
    DEVICE_CATEGORIES.forEach(c => categoryCount[c.code] = 0);
    devices.filter(d => !d.is_deleted && d.status !== 'scrapped').forEach(d => {
      categoryCount[d.category] = (categoryCount[d.category] || 0) + 1;
    });

    // 2. 费用趋势（按月）
    const trendByMonth = {};
    const monthsBack = Math.min(12, Math.ceil(daysBack / 30));
    for (let i = monthsBack - 1; i >= 0; i--) {
      const d = new Date(); d.setMonth(d.getMonth() - i);
      const key = d.toISOString().slice(0,7);
      trendByMonth[key] = { month: key, maintain: 0, repair: 0 };
    }
    recsInRange.forEach(r => {
      const m = r.record_date.slice(0,7);
      if (trendByMonth[m]) trendByMonth[m].maintain += r.actual_cost || 0;
    });
    faultsInRange.filter(f=>f.status==='closed').forEach(f => {
      const m = (f.close_date||f.report_date).slice(0,7);
      if (trendByMonth[m]) trendByMonth[m].repair += f.repair_cost || 0;
    });

    // 3. 故障率排行（按分类，真实计算 = 故障数/设备数）
    const faultStats = {};
    DEVICE_CATEGORIES.forEach(c => faultStats[c.code] = { total: 0, faults: 0 });
    devices.filter(d=>!d.is_deleted).forEach(d => {
      if (faultStats[d.category]) faultStats[d.category].total++;
    });
    faultsInRange.forEach(f => {
      if (faultStats[f.category]) faultStats[f.category].faults++;
    });
    const faultRate = DEVICE_CATEGORIES.map(c => ({
      category: c.code,
      name: c.name,
      total: faultStats[c.code].total,
      faults: faultStats[c.code].faults,
      rate: faultStats[c.code].total > 0
        ? (faultStats[c.code].faults / faultStats[c.code].total * 100).toFixed(2)
        : '0.00',
    })).filter(x => x.total > 0).sort((a,b) => Number(b.rate) - Number(a.rate));

    // 4. 分类 TCO 对比（采购+保养+维修）
    const tcoByCat = {};
    DEVICE_CATEGORIES.forEach(c => tcoByCat[c.code] = { name: c.name, purchase: 0, maintain: 0, repair: 0 });
    devices.filter(d=>!d.is_deleted).forEach(d => {
      if (tcoByCat[d.category]) tcoByCat[d.category].purchase += d.purchase_cost || 0;
    });
    records.forEach(r => { if (tcoByCat[r.category]) tcoByCat[r.category].maintain += r.actual_cost || 0; });
    faults.filter(f=>f.status==='closed').forEach(f => {
      if (tcoByCat[f.category]) tcoByCat[f.category].repair += f.repair_cost || 0;
    });

    return {
      categoryCount,
      trends: Object.values(trendByMonth),
      faultRate,
      tcoByCat: Object.entries(tcoByCat).filter(([k,v])=>v.purchase>0||v.maintain>0||v.repair>0).map(([k,v])=>({code:k,...v})),
      // 关键指标率
      stats: {
        totalDevices: devices.filter(d=>!d.is_deleted).length,
        activeDevices: devices.filter(d=>!d.is_deleted && d.status==='in_use').length,
        // 在用率
        utilizationRate: (() => {
          const total = devices.filter(d=>!d.is_deleted).length;
          const used = devices.filter(d=>!d.is_deleted && d.status==='in_use').length;
          return total > 0 ? (used/total*100).toFixed(2) : '0.00';
        })(),
        // 完好率
        intactRate: (() => {
          const total = devices.filter(d=>!d.is_deleted).length;
          const intact = devices.filter(d=>!d.is_deleted && ['in_use','in_stock'].includes(d.status)).length;
          return total > 0 ? (intact/total*100).toFixed(2) : '0.00';
        })(),
        // 故障率（年化）
        annualFaultRate: (() => {
          const total = devices.filter(d=>!d.is_deleted).length;
          const yearFaults = faults.filter(f => f.report_date >= addDays(today(), -365)).length;
          return total > 0 ? (yearFaults/total*100).toFixed(2) : '0.00';
        })(),
        // 保养完成率（已完成保养记录数 / 应完成数 = 已完成/(plans 总数)）
        maintainCompleteRate: (() => {
          const ratio = recsInRange.length / Math.max(1, devices.filter(d=>!d.is_deleted&&d.status!=='scrapped').length * (daysBack/90));
          return Math.min(100, ratio * 100).toFixed(2);
        })(),
        // 工单关闭率
        faultCloseRate: (() => {
          const closed = faultsInRange.filter(f=>f.status==='closed').length;
          return faultsInRange.length > 0 ? (closed/faultsInRange.length*100).toFixed(2) : '0.00';
        })(),
        // 平均无故障运行时间 MTBF（小时） = 总运行小时 / 故障次数
        mtbf: (() => {
          const inUseCount = devices.filter(d=>!d.is_deleted && ['in_use','fault'].includes(d.status)).length;
          const totalHours = inUseCount * (daysBack * 24);
          const faultCount = faultsInRange.length;
          return faultCount > 0 ? Math.round(totalHours / faultCount) : 0;
        })(),
        // 平均修复时间 MTTR（小时）
        mttr: (() => {
          const closed = faultsInRange.filter(f=>f.status==='closed' && f.downtime_hours);
          if (closed.length === 0) return 0;
          return Math.round(closed.reduce((s,f)=>s+f.downtime_hours,0) / closed.length);
        })(),
        // 累计采购金额
        totalPurchase: purchases.filter(p=>p.status==='received').reduce((s,p)=>s+p.total_amount,0),
        // 累计运维成本（保养+维修）
        totalOpCost: recsInRange.reduce((s,r)=>s+(r.actual_cost||0),0) + faultsInRange.reduce((s,f)=>s+(f.repair_cost||0),0),
      }
    };
  },

  // 写审计日志
  async log(operator, action, target, detail) {
    return dbApi.insert('sys_audit_log', {
      id:uid(), operator, operate_time:now(), client_ip:'127.0.0.1',
      action, target: target||'', detail: typeof detail==='object' ? JSON.stringify(detail) : (detail||'')
    });
  },

  // 写生命周期事件
  async logLifecycle(deviceId, eventType, title, detail, operator, cost=0) {
    const device = await dbApi.get('device_archive', deviceId);
    return dbApi.insert('lifecycle_event', {
      id:uid(), device_id:deviceId, bridge_id:device?.bridge_id,
      event_type:eventType, event_date:today(),
      title, detail, operator, cost, create_time:now()
    });
  },
};

let _msgId = 0;
const Toast = {
  list: [],
  listeners: [],
  show(type, msg) {
    const id = ++_msgId;
    this.list.push({ id, type, msg });
    this.listeners.forEach(fn => fn([...this.list]));
    setTimeout(() => {
      this.list = this.list.filter(x => x.id !== id);
      this.listeners.forEach(fn => fn([...this.list]));
    }, 3000);
  },
  success(m) { this.show('success', m); },
  error(m) { this.show('error', m); },
  info(m) { this.show('info', m); },
  warn(m) { this.show('warn', m); },
};

function ToastContainer() {

// 通用 ECharts 容器
function Chart({ option, height='280px', className='' }) {
  const ref = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (ref.current && !inst.current) {
      inst.current = echarts.init(ref.current);
    }
    if (inst.current && option) {
      inst.current.setOption(option, true);
    }
    const onResize = () => inst.current?.resize();
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, [option]);
  useEffect(() => () => { inst.current?.dispose(); inst.current = null; }, []);
  return <div ref={ref} style={{height,width:'100%'}} className={className} />;
}

function TodoList() {
  const [todos, setTodos] = useState([]);
  const { setMenu } = useApp();
  useEffect(() => { (async () => {
    const devices = await dbApi.all('device_archive');
    const faults = await dbApi.all('fault_order');
    const scraps = await dbApi.all('scrap_decision');

    const list = [];
    // 超期保养
    devices.filter(d => !d.is_deleted && d.next_maintain_date && d.next_maintain_date < today() && d.status === 'in_use')
      .slice(0,5).forEach(d => list.push({
        type:'保养超期', title: d.device_name+' ('+d.device_code+')',
        desc:'计划保养日期 '+d.next_maintain_date+'，已超期 '+daysBetween(d.next_maintain_date, today())+' 天',
        color:'red', goto:'maintain'
      }));
    // 待处理故障
    faults.filter(f => f.status === 'pending').slice(0,3).forEach(f => {
      const d = devices.find(x => x.id === f.device_id);
      if (d) list.push({
        type:'待处理故障', title: d.device_name+'：'+f.fault_desc,
        desc:'报修日期 '+f.report_date+'，请尽快处理',
        color:'amber', goto:'fault'
      });
    });
    // 待审批报废
    scraps.filter(s => s.status === 'pending').forEach(s => {
      list.push({ type:'待审报废', title:'报废决策 '+s.id.slice(-8), desc:'TCO 决策已提交，待审批',
        color:'purple', goto:'scrap' });
    });
    setTodos(list);
  })(); }, []);

  if (todos.length === 0) return <div className="text-gray-400 text-center py-6 text-sm">暂无待办事项 ✓</div>;
  return (
    <div className="space-y-2">
      {todos.map((t,i) => (
        <div key={i} className="flex items-center justify-between p-3 border rounded-lg hover:shadow-sm transition-all">
          <div className="flex items-center gap-3 flex-1 min-w-0">
            <Tag color={t.color}>{t.type}</Tag>
            <div className="min-w-0">
              <div className="text-sm font-medium truncate">{t.title}</div>
              <div className="text-xs text-gray-500">{t.desc}</div>
            </div>
          </div>
          <Btn type="text" onClick={()=>setMenu(t.goto)}>去处理 →</Btn>
        </div>
      ))}
    </div>
  );
}

function LifecycleTimeline({ device, bridges, onRefresh }) {
  const [events, setEvents] = useState([]);
  const [residual, setResidual] = useState(0);

  useEffect(() => { (async () => {
    const all = await dbApi.all('lifecycle_event');
    const list = all.filter(e => e.device_id === device.id)
      .sort((a,b) => (a.event_date+a.create_time).localeCompare(b.event_date+b.create_time));
    setEvents(list);
    setResidual(await services.calcResidual(device));
  })(); }, [device]);

  const bridge = bridges.find(b => b.id === device.bridge_id);
  const usedYears = ((Date.now() - new Date(device.in_use_date)) / (365.25 * 86400000)).toFixed(2);
  const lifeRatio = (Number(usedYears) / device.design_life_years * 100).toFixed(1);

  // 累计成本统计
  const totalMaintain = events.filter(e => e.event_type === 'maintain').reduce((s,e)=>s+(e.cost||0), 0);
  const totalRepair = events.filter(e => e.event_type === 'repair').reduce((s,e)=>s+(e.cost||0), 0);
  const totalCost = device.purchase_cost + totalMaintain + totalRepair;

  const eventColors = {
    purchase:   { color:'bg-purple-500', icon:'📦', label:'采购入库' },
    commission: { color:'bg-blue-500',   icon:'🚀', label:'投入使用' },
    maintain:   { color:'bg-green-500',  icon:'🔧', label:'例行保养' },
    repair:     { color:'bg-amber-500',  icon:'🛠️', label:'故障维修' },
    scrap:      { color:'bg-red-500',    icon:'🗑️', label:'报废处置' },
  };

  return (
    <div className="space-y-4">
      {/* 设备概览 */}
      <div className="bg-gradient-to-br from-slate-50 to-blue-50 border rounded-lg p-4">
        <div className="flex items-start justify-between mb-3">
          <div>
            <div className="text-lg font-bold text-gray-800">{device.device_name}</div>
            <div className="text-xs text-gray-500">{device.device_code} · {bridge?.bridge_name} · {catName(device.category)}</div>
          </div>
          <Tag color={device.status==='in_use'?'green':device.status==='fault'?'red':device.status==='scrapped'?'gray':'amber'}>
            {DEVICE_STATUS[device.status]?.label||device.status}
          </Tag>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
          <div><div className="text-xs text-gray-500">投用日期</div><div className="font-medium">{device.in_use_date}</div></div>
          <div><div className="text-xs text-gray-500">已使用</div><div className="font-medium">{usedYears} 年</div></div>
          <div><div className="text-xs text-gray-500">设计寿命</div><div className="font-medium">{device.design_life_years} 年</div></div>
          <div><div className="text-xs text-gray-500">寿命进度</div>
            <div className={`font-medium ${Number(lifeRatio)>80?'text-red-600':Number(lifeRatio)>60?'text-amber-600':'text-green-600'}`}>{lifeRatio}%</div>
          </div>
          <div><div className="text-xs text-gray-500">采购价</div><div className="font-medium">{fmtMoney(device.purchase_cost)}</div></div>
          <div><div className="text-xs text-gray-500">累计保养</div><div className="font-medium text-green-600">{fmtMoney(totalMaintain)}</div></div>
          <div><div className="text-xs text-gray-500">累计维修</div><div className="font-medium text-amber-600">{fmtMoney(totalRepair)}</div></div>
          <div><div className="text-xs text-gray-500">当前残值</div><div className="font-medium text-purple-600">{fmtMoney(residual)}</div></div>
        </div>
        <div className="mt-3 text-xs text-gray-600 bg-white border rounded px-3 py-2">
          📊 <b>全生命周期总成本（TCO）</b>：{fmtMoney(totalCost)}
          （采购 {fmtMoney(device.purchase_cost)} + 保养 {fmtMoney(totalMaintain)} + 维修 {fmtMoney(totalRepair)}）
        </div>
      </div>

      {/* 事件时间轴 */}
      <div>
        <div className="flex items-center justify-between mb-3">
          <h4 className="font-semibold text-gray-800">📜 生命周期事件流水</h4>
          <span className="text-xs text-gray-500">共 {events.length} 个事件</span>
        </div>
        <div className="relative pl-6 border-l-2 border-gray-200 space-y-3">
          {events.length === 0 && <div className="text-center text-gray-400 text-sm py-4">暂无事件</div>}
          {events.map((e, idx) => {
            const cfg = eventColors[e.event_type] || { color:'bg-gray-400', icon:'•', label:e.event_type };
            return (
              <div key={e.id} className="relative">
                <div className={`absolute -left-[33px] w-6 h-6 rounded-full flex items-center justify-center ${cfg.color} text-white text-xs shadow`}>
                  {cfg.icon}
                </div>
                <div className="bg-white border rounded-lg p-3 hover:shadow-sm transition-all">
                  <div className="flex items-center justify-between">
                    <div className="font-medium text-sm">{e.title}</div>
                    <div className="text-xs text-gray-500">{e.event_date}</div>
                  </div>
                  <div className="text-xs text-gray-600 mt-1">{e.detail}</div>
                  <div className="text-[10px] text-gray-400 mt-1">操作人：{e.operator} {e.cost > 0 && '· 费用：'+fmtMoney(e.cost)}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function BridgeEditDrawer({ bridge, onClose, onSaved }) {
  const { user } = useApp();
  const isNew = bridge._new;
  const [tab, setTab] = useState('basic');
  const [form, setForm] = useState(isNew ? {
    bridge_code:'', bridge_name:'', province:'江西', city:'', climate_zone:'temperate_normal',
    aadt:5000, aadt_source:'人工统计', open_to_traffic_date: today(), design_load_grade:'公路-Ⅰ级',
    responsible_dept:'', purchase_price:0, design_life_years:50, annual_maintain_cost:0,
    target_life_years:60, external_monitoring_id:''
  } : {...bridge});

  const set = (k, v) => setForm(p => ({...p, [k]: v}));

  const save = async () => {
    if (!form.bridge_name || !form.city || !form.province) {
      Toast.error('请填写完整的基础信息'); return;
    }
    if (isNew) {
      const max = (await dbApi.all('bridge')).length + 1;
      form.bridge_code = form.bridge_code || `BR-AUTO-${String(max).padStart(3,'0')}`;
      form.id = uid();
      form.aadt_last_update = today();
      form.is_deleted = 0;
      form.create_time = now();
      form.update_time = now();
      await dbApi.insert('bridge', form);
      await services.log(user.username, 'CREATE_BRIDGE', form.bridge_code, '新建桥梁档案');
      Toast.success('新建桥梁成功');
    } else {
      form.update_time = now();
      await dbApi.update('bridge', form);
      await services.log(user.username, 'UPDATE_BRIDGE', form.bridge_code, '修改桥梁档案');
      Toast.success('保存成功');
    }
    onSaved();
  };

  return (
    <Drawer open title={isNew ? '+ 新建桥梁' : '编辑桥梁档案'} onClose={onClose} width="640px">
      <div className="p-5 space-y-4">
        <div className="flex border-b">
          {[{k:'basic',n:'基础信息'},{k:'runtime',n:'运行参数'}].map(t => (
            <button key={t.k} onClick={()=>setTab(t.k)}
              className={`px-4 py-2 text-sm border-b-2 -mb-px ${tab===t.k?'border-blue-500 text-blue-600':'border-transparent text-gray-500'}`}>{t.n}</button>
          ))}

function Field({ label, value, onChange, type='text', colSpan=1, disabled=false, placeholder }) {
  return (
    <div className={colSpan===2?'col-span-2':''}>
      <label className="text-xs text-gray-600 mb-1 block">{label}</label>
      <input type={type} value={value??''} disabled={disabled} placeholder={placeholder}
        onChange={e=>onChange(type==='number'?e.target.value:e.target.value)}
        className="w-full border rounded px-2.5 py-1.5 text-sm focus:border-blue-500 disabled:bg-gray-100"/>
    </div>
  );
}
function SelectField({ label, value, onChange, options, colSpan=1 }) {
  return (
    <div className={colSpan===2?'col-span-2':''}>
      <label className="text-xs text-gray-600 mb-1 block">{label}</label>
      <select value={value} onChange={e=>onChange(e.target.value)}
        className="w-full border rounded px-2.5 py-1.5 text-sm focus:border-blue-500">
        {options.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
      </select>
    </div>
  );
}
function TextareaField({ label, value, onChange, colSpan=1 }) {
  return (
    <div className={colSpan===2?'col-span-2':''}>
      <label className="text-xs text-gray-600 mb-1 block">{label}</label>
      <textarea value={value??''} onChange={e=>onChange(e.target.value)} rows={3}
        className="w-full border rounded px-2.5 py-1.5 text-sm focus:border-blue-500"/>
    </div>
  );
}

function AadtModal({ bridge, onClose, onSaved }) {
  const { user } = useApp();
  const [aadt, setAadt] = useState(bridge.aadt);
  const [source, setSource] = useState('人工统计');

  const save = async () => {
    if (Number(aadt) <= 0) { Toast.error('AADT 必须为正整数'); return; }
    if (!source.trim()) { Toast.error('请填写数据来源'); return; }
    bridge.aadt = Number(aadt);
    bridge.aadt_source = source;
    bridge.aadt_last_update = today();
    bridge.update_time = now();
    await dbApi.update('bridge', bridge);
    await dbApi.insert('bridge_aadt_history', {
      id:uid(), bridge_id:bridge.id, aadt:Number(aadt), source, operator:user.username, changed_at: now()
    });
    await services.log(user.username, 'UPDATE_AADT', bridge.bridge_code, `AADT 更新为 ${aadt}（${source}）`);
    Toast.success('AADT 已更新，并已同步至历史记录');
    onSaved();
  };

  return (
    <Modal open title={`快速更新 AADT - ${bridge.bridge_name}`} onClose={onClose} width="460px"
      footer={<><Btn onClick={onClose}>取消</Btn><Btn type="primary" onClick={save}>提交</Btn></>}>
      <div className="space-y-3">
        <div className="bg-gray-50 border rounded p-3 text-sm">
          <div className="text-xs text-gray-500">当前 AADT</div>
          <div className="font-bold text-lg">{bridge.aadt.toLocaleString()}（β = {aadtBeta(bridge.aadt).toFixed(2)}）</div>
          <div className="text-xs text-gray-400 mt-1">最近更新：{bridge.aadt_last_update}</div>
        </div>
        <Field type="number" label="新 AADT 值" value={aadt} onChange={setAadt}/>
        <Field label="来源说明" value={source} onChange={setSource} placeholder="如：年度统计 / SHM 推送"/>
        <div className="bg-blue-50 border border-blue-200 rounded p-2 text-xs text-blue-800">
          更新后新的 β 系数：<b>{aadtBeta(Number(aadt)).toFixed(2)}</b>
        </div>
      </div>
    </Modal>
  );
}

function AadtHistoryModal({ bridge, onClose }) {
  const [list, setList] = useState([]);
  useEffect(() => { (async () => {
    const all = await dbApi.all('bridge_aadt_history');
    setList(all.filter(h => h.bridge_id === bridge.id).sort((a,b)=>b.changed_at.localeCompare(a.changed_at)));

    yAxis:{type:'value',axisLabel:{formatter:'{value}',fontSize:10}},

function DevicesPage() {

  const [devices, setDevices] = useState([]);
  const [bridges, setBridges] = useState([]);
  const [keyword, setKeyword] = useState('');
  const [bridgeFilter, setBridgeFilter] = useState('');

  const [statusFilter, setStatusFilter] = useState('');

  const [detail, setDetail] = useState(null);

  const reload = useCallback(async () => {
    setDevices(await dbApi.all('device_archive'));
    setBridges(await dbApi.all('bridge'));

  const filtered = useMemo(() => devices.filter(d => !d.is_deleted)
    .filter(d => !keyword || d.device_name.includes(keyword) || d.device_code.includes(keyword))
    .filter(d => !bridgeFilter || d.bridge_id === bridgeFilter)

            <option value="">全部桥梁</option>
            {bridges.map(b => <option key={b.id} value={b.id}>{b.bridge_name}</option>)}
          </select>
          <select className="border rounded px-3 py-1.5 text-sm" value={catFilter} onChange={e=>setCatFilter(e.target.value)}>
            <option value="">全部分类</option>
            {DEVICE_CATEGORIES.map(c => <option key={c.code} value={c.code}>{c.name}</option>)}
          </select>
          <select className="border rounded px-3 py-1.5 text-sm" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
            <option value="">全部状态</option>
            {Object.entries(DEVICE_STATUS).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}

          <span className="text-xs text-gray-500 ml-2">共 {filtered.length} 台</span>
          <div className="ml-auto flex gap-2">
            {(user.role_code === 'admin' || user.role_code === 'engineer') && (

            )}

        </div>

        <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead className="bg-gray-50 text-gray-600 text-xs">
            <tr>
              <th className="px-3 py-2 text-left">设备编码</th>
              <th className="px-3 py-2 text-left">设备名称</th>
              <th className="px-3 py-2 text-left">分类</th>
              <th className="px-3 py-2 text-left">所属桥梁</th>
              <th className="px-3 py-2 text-center">状态</th>
              <th className="px-3 py-2 text-right">采购价</th>
              <th className="px-3 py-2 text-left">下次保养</th>
              <th className="px-3 py-2 text-center">操作</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(d => {
              const overdue = d.next_maintain_date && d.next_maintain_date < today() && d.status === 'in_use';
              const upcoming = d.next_maintain_date && daysBetween(today(), d.next_maintain_date) <= 7 && daysBetween(today(), d.next_maintain_date) >= 0;
              return (
                <tr key={d.id} className={`border-t hover:bg-gray-50 ${overdue?'bg-red-50/40':upcoming?'bg-yellow-50/40':''}`}>

                    <Tag color={d.status==='in_use'?'green':d.status==='fault'?'red':d.status==='scrapped'?'gray':d.status==='maintaining'?'amber':'blue'}>{DEVICE_STATUS[d.status]?.label}</Tag>

                  <td className="px-3 py-2 text-right text-xs">{fmtMoney(d.purchase_cost)}</td>

        </table>

      {edit && <DeviceEditDrawer device={edit} bridges={bridges} onClose={()=>setEdit(null)} onSaved={()=>{setEdit(null);reload();}}/>}
      {detail && <DeviceDetailModal device={detail} bridges={bridges} onClose={()=>setDetail(null)}/>}
    </div>
  );

function DeviceEditDrawer({ device, bridges, onClose, onSaved }) {
  const { user } = useApp();
  const isNew = device._new;
  const [form, setForm] = useState(isNew ? {
    bridge_id: bridges[0]?.id || '', category:'lighting', device_name:'', spec:'', manufacturer:'',
    purchase_cost: 0, annual_maintain_cost: 0, annual_repair_cost: 0,
    in_use_date: today(), status:'in_use', design_life_years: 8,
    last_maintain_date: today(), next_maintain_date: addDays(today(), 90),
    fault_count_month: 0, fault_count_year: 0, external_monitoring: 0,
  } : {...device});
  const set = (k,v) => setForm(p => ({...p, [k]: v}));

  const save = async () => {
    if (!form.device_name || !form.bridge_id || !form.category) {
      Toast.error('请完整填写关键字段'); return;
    }
    if (isNew) {
      // 自动生成编码
      const bridge = bridges.find(b => b.id === form.bridge_id);
      const cat = catCfg(form.category);
      const year = form.in_use_date.slice(0, 4);
      const all = await dbApi.all('device_archive');
      const sameSeries = all.filter(d => d.bridge_id===form.bridge_id && d.category===form.category && d.in_use_date.startsWith(year));
      const seq = String(sameSeries.length + 1).padStart(3,'0');
      form.device_code = `${bridge.bridge_code}-${cat.abbr}-${year}-${seq}`;
      form.id = uid();
      form.design_life_years = form.design_life_years || cat.designLife;
      form.is_deleted = 0;
      form.create_time = now();
      form.update_time = now();
      await dbApi.insert('device_archive', form);
      // 同步生命周期事件
      await services.logLifecycle(form.id, 'purchase', '设备采购入库', `${form.device_name} 采购入库，单价 ${fmtMoney(form.purchase_cost)}`, user.username, form.purchase_cost);
      await services.logLifecycle(form.id, 'commission', '设备投入使用', `${form.device_name} 安装并投入使用，预计设计寿命 ${form.design_life_years} 年`, user.username, 0);
      await services.log(user.username, 'CREATE_DEVICE', form.device_code, '新增设备档案');
      Toast.success(`新增成功，编码：${form.device_code}`);
    } else {
      form.update_time = now();
      await dbApi.update('device_archive', form);
      await services.log(user.username, 'UPDATE_DEVICE', form.device_code, '修改设备档案');
      Toast.success('保存成功');
    }
    onSaved();
  };

  return (
    <Drawer open title={isNew?'+ 新增设备':'编辑设备档案'} onClose={onClose} width="620px">
      <div className="p-5 space-y-3">
        <div className="grid grid-cols-2 gap-3">
          <SelectField label="所属桥梁*" value={form.bridge_id} onChange={v=>set('bridge_id',v)}
            options={bridges.map(b=>({v:b.id,l:b.bridge_name}))}/>
          <SelectField label="设备分类*" value={form.category} onChange={v=>{
              const c = catCfg(v);
              set('category', v);
              if (isNew) set('design_life_years', c.designLife);
            }}
            options={DEVICE_CATEGORIES.map(c=>({v:c.code,l:c.name}))}/>
          <Field label="设备名称*" value={form.device_name} onChange={v=>set('device_name',v)} colSpan={2}/>
          <Field label="规格型号" value={form.spec} onChange={v=>set('spec',v)}/>
          <Field label="生产厂家" value={form.manufacturer} onChange={v=>set('manufacturer',v)}/>
          <Field type="date" label="投用日期*" value={form.in_use_date} onChange={v=>set('in_use_date',v)}/>
          <Field type="number" label="设计寿命（年）" value={form.design_life_years} onChange={v=>set('design_life_years',Number(v))}/>
          <Field type="number" label="采购成本*" value={form.purchase_cost} onChange={v=>set('purchase_cost',Number(v))}/>
          <SelectField label="设备状态" value={form.status} onChange={v=>set('status',v)}
            options={Object.entries(DEVICE_STATUS).map(([k,v])=>({v:k,l:v.label}))}/>
          <Field type="number" label="年保养费" value={form.annual_maintain_cost} onChange={v=>set('annual_maintain_cost',Number(v))}/>
          <Field type="number" label="年维修费" value={form.annual_repair_cost} onChange={v=>set('annual_repair_cost',Number(v))}/>
          <Field type="date" label="上次保养" value={form.last_maintain_date} onChange={v=>set('last_maintain_date',v)}/>
          <Field type="date" label="下次保养" value={form.next_maintain_date} onChange={v=>set('next_maintain_date',v)}/>
        </div>
        {!isNew && (
          <div className="bg-gray-50 border rounded p-3 text-xs text-gray-600">
            <b>当前编码：</b>{form.device_code} · <b>创建时间：</b>{form.create_time}
          </div>
        )}
      </div>
      <div className="p-4 border-t bg-gray-50 flex justify-end gap-2 sticky bottom-0">
        <Btn onClick={onClose}>取消</Btn>
        <Btn type="primary" onClick={save}>保存</Btn>
      </div>
    </Drawer>
  );
}

function DeviceDetailModal({ device, bridges, onClose }) {
  const [residual, setResidual] = useState(0);
  const [maintainCount, setMaintainCount] = useState(0);
  const [faultCount, setFaultCount] = useState(0);
  useEffect(()=>{(async()=>{
    setResidual(await services.calcResidual(device));
    const ms = await dbApi.query('maintain_record', m => m.device_id === device.id);
    setMaintainCount(ms.length);
    const fs = await dbApi.query('fault_order', f => f.device_id === device.id);
    setFaultCount(fs.length);
  })();}, [device]);
  const bridge = bridges.find(b=>b.id===device.bridge_id);
  const usedYears = ((Date.now() - new Date(device.in_use_date)) / (365.25*86400000)).toFixed(2);
  const lifeRatio = (Number(usedYears)/device.design_life_years*100).toFixed(1);

  return (
    <Modal open title="设备详情" onClose={onClose} width="600px" footer={<Btn onClick={onClose}>关闭</Btn>}>
      <div className="space-y-3 text-sm">
        <div className="bg-gradient-to-br from-slate-50 to-blue-50 rounded p-3">
          <div className="text-lg font-bold">{device.device_name}</div>
          <div className="text-xs text-gray-500 font-mono">{device.device_code}</div>
        </div>
        <div className="grid grid-cols-2 gap-2 text-xs">
          {[
            ['所属桥梁', bridge?.bridge_name],
            ['设备分类', catName(device.category)],
            ['当前状态', DEVICE_STATUS[device.status]?.label],
            ['投用日期', device.in_use_date],
            ['已使用年数', usedYears + ' 年 ('+lifeRatio+'%)'],
            ['设计寿命', device.design_life_years + ' 年'],
            ['规格型号', device.spec || '-'],
            ['生产厂家', device.manufacturer || '-'],
            ['采购成本', fmtMoney(device.purchase_cost)],
            ['当前残值', fmtMoney(residual)],
            ['年保养费', fmtMoney(device.annual_maintain_cost)],
            ['年维修费', fmtMoney(device.annual_repair_cost)],
            ['上次保养', device.last_maintain_date || '-'],
            ['下次保养', device.next_maintain_date || '-'],
            ['累计保养次数', maintainCount + ' 次'],
            ['累计故障次数', faultCount + ' 次'],
            ['本月故障', device.fault_count_month + ' 次'],
            ['外部监测', device.external_monitoring ? '已对接' : '未对接'],
          ].map(([k,v]) => (
            <div key={k} className="flex border-b py-1.5">
              <span className="text-gray-500 w-24">{k}</span>
              <span className="font-medium flex-1">{v}</span>
            </div>
          ))}
        </div>
      </div>
    </Modal>
  );
}

  const [reportDevice, setReportDevice] = useState(null);

  const reload = useCallback(async () => {
    setPlans(await dbApi.all('maintain_plan'));
    setDevices(await dbApi.all('device_archive'));
    setBridges(await dbApi.all('bridge'));

  useEffect(() => { reload(); }, [reload]);

  const enriched = plans.map(p => {
    const d = devices.find(x => x.id === p.device_id);
    const b = bridges.find(x => x.id === d?.bridge_id);
    const overdue = d && d.next_maintain_date && d.next_maintain_date < today();
    const upcoming = d && d.next_maintain_date && daysBetween(today(), d.next_maintain_date) <= 7;
    return { ...p, device: d, bridge: b, overdue, upcoming };

  return (
    <>

        <Tag color="amber">7 天内到期 {enriched.filter(p=>p.upcoming&&!p.overdue).length}</Tag>
        <Tag color="green">正常 {enriched.filter(p=>!p.overdue&&!p.upcoming).length}</Tag>
      </div>
      <div className="overflow-x-auto">
      <table className="w-full text-sm">
        <thead className="bg-gray-50 text-xs text-gray-600">
          <tr>
            <th className="px-3 py-2 text-left">设备</th>
            <th className="px-3 py-2 text-left">所属桥梁</th>
            <th className="px-3 py-2 text-left">分类</th>
            <th className="px-3 py-2 text-center">保养周期</th>
            <th className="px-3 py-2 text-left">上次保养</th>
            <th className="px-3 py-2 text-left">下次保养</th>
            <th className="px-3 py-2 text-center">状态</th>
            <th className="px-3 py-2 text-center">操作</th>
          </tr>
        </thead>
        <tbody>
          {enriched.map(p => (
            <tr key={p.id} className={`border-t hover:bg-gray-50 ${p.overdue?'bg-red-50/30':p.upcoming?'bg-yellow-50/30':''}`}>
              <td className="px-3 py-2"><div className="font-medium">{p.device.device_name}</div><div className="text-xs text-gray-500 font-mono">{p.device.device_code}</div></td>
              <td className="px-3 py-2 text-xs">{p.bridge?.bridge_name}</td>
              <td className="px-3 py-2 text-xs">{catName(p.device.category)}</td>
              <td className="px-3 py-2 text-center text-xs">{p.cycle_days} 天</td>
              <td className="px-3 py-2 text-xs">{p.device.last_maintain_date}</td>
              <td className="px-3 py-2 text-xs">
                {p.overdue && <span className="text-red-600 font-bold">⚠ </span>}
                {p.upcoming && !p.overdue && <span className="text-amber-600">⏰ </span>}
                {p.device.next_maintain_date}
                {p.overdue && <div className="text-[10px] text-red-500">超期 {daysBetween(p.device.next_maintain_date, today())} 天</div>}
              </td>
              <td className="px-3 py-2 text-center">
                {p.overdue ? <Tag color="red">超期</Tag> : p.upcoming ? <Tag color="amber">即将到期</Tag> : <Tag color="green">正常</Tag>}

                {(user.role_code === 'maintainer' || user.role_code === 'admin' || user.role_code === 'engineer') && (

      {reportDevice && <ReportMaintainModal device={reportDevice} onClose={()=>setReportDevice(null)} onSaved={()=>{setReportDevice(null);reload();}}/>}
    </>
  );
}

function ReportMaintainModal({ device, onClose, onSaved }) {
  const { user } = useApp();
  const [content, setContent] = useState('例行' + catName(device.category) + '保养');
  const [manhour, setManhour] = useState(2);
  const [actualCost, setActualCost] = useState(Math.round((device.annual_maintain_cost || 0) / 4));
  const [material, setMaterial] = useState('常规耗材');
  const [result, setResult] = useState('normal');

  const submit = async () => {
    if (!content.trim()) { Toast.error('请填写保养内容'); return; }
    if (Number(manhour) <= 0) { Toast.error('工时必须为正数'); return; }

    // 写入保养记录
    await dbApi.insert('maintain_record', {
      id:uid(), device_id:device.id, bridge_id:device.bridge_id, category:device.category,
      record_date:today(), actual_cost:Number(actualCost), manhour:Number(manhour),
      material, content, operator:user.username, photos:0, result, create_time:now()
    });

    // 更新设备的上次/下次保养日期
    const cycleDays = catCfg(device.category).maintainCycleDays;
    const bridge = await dbApi.get('bridge', device.bridge_id);
    const adjustedCycle = Math.round(cycleDays * climateAlpha(bridge?.climate_zone) * aadtBeta(bridge?.aadt || 10000));
    device.last_maintain_date = today();
    device.next_maintain_date = addDays(today(), adjustedCycle);
    if (device.status === 'maintaining') device.status = 'in_use';
    device.update_time = now();
    await dbApi.update('device_archive', device);

    // 写生命周期事件
    await services.logLifecycle(device.id, 'maintain', '例行保养',
      `${device.device_name}：${content}，工时 ${manhour}h，费用 ${fmtMoney(actualCost)}`,
      user.username, Number(actualCost));

    if (result === 'fault_found') {
      // 一键转维修工单
      await dbApi.insert('fault_order', {
        id:uid(), device_id:device.id, bridge_id:device.bridge_id, category:device.category,
        report_date:today(), report_user:user.username, fault_desc:'保养中发现潜在故障：'+content,
        repair_cost:0, repair_user:null, status:'pending', close_date:null, downtime_hours:null,
        create_time:now()
      });
      Toast.warn('已上报保养记录，并自动生成维修工单');
    } else {
      Toast.success('保养记录已上报');
    }
    await services.log(user.username, 'REPORT_MAINTAIN', device.device_code, content);
    onSaved();
  };

  return (
    <Modal open title={`上报保养记录 - ${device.device_name}`} onClose={onClose} width="500px"
      footer={<><Btn onClick={onClose}>取消</Btn><Btn type="primary" onClick={submit}>提交</Btn></>}>
      <div className="space-y-3">
        <div className="bg-gray-50 border rounded p-2 text-xs">
          {device.device_code} · {catName(device.category)} · 上次保养 {device.last_maintain_date}
        </div>
        <TextareaField label="保养内容" value={content} onChange={setContent}/>
        <div className="grid grid-cols-2 gap-3">
          <Field type="number" label="工时（小时）" value={manhour} onChange={setManhour}/>
          <Field type="number" label="实际费用" value={actualCost} onChange={setActualCost}/>
        </div>
        <Field label="消耗材料" value={material} onChange={setMaterial}/>
        <SelectField label="保养结果" value={result} onChange={setResult}
          options={[{v:'normal',l:'正常完成'},{v:'fault_found',l:'发现潜在故障 - 自动转维修工单'}]}/>
      </div>
    </Modal>
  );
}

function ReportFaultModal({ devices, onClose, onSaved }) {
  const { user } = useApp();
  const [deviceId, setDeviceId] = useState(devices[0]?.id || '');
  const [desc, setDesc] = useState('');

  const submit = async () => {
    if (!desc.trim() || !deviceId) { Toast.error('请填写完整信息'); return; }
    const device = devices.find(d => d.id === deviceId);
    await dbApi.insert('fault_order', {
      id:uid(), device_id:deviceId, bridge_id:device.bridge_id, category:device.category,
      report_date:today(), report_user:user.username, fault_desc:desc,
      repair_cost:0, repair_user:null, status:'pending', close_date:null, downtime_hours:null,
      create_time:now()
    });
    // 设备状态变为 fault
    if (device.status === 'in_use') {
      device.status = 'fault';
      device.fault_count_month = (device.fault_count_month || 0) + 1;
      await dbApi.update('device_archive', device);
    }
    await services.log(user.username, 'REPORT_FAULT', device.device_code, desc);
    Toast.success('故障已上报，等待维修');
    onSaved();
  };

  return (
    <Modal open title="故障申报" onClose={onClose} width="500px"

function CloseFaultModal({ order, onClose, onSaved }) {
  const { user } = useApp();
  const [cost, setCost] = useState(Math.round((order.device?.annual_repair_cost || 1000) * 0.3));
  const [hours, setHours] = useState(8);

  const submit = async () => {
    if (Number(cost) < 0) { Toast.error('维修费不能为负数'); return; }
    order.status = 'closed';
    order.repair_cost = Number(cost);
    order.repair_user = user.username;
    order.close_date = today();
    order.downtime_hours = Number(hours);
    await dbApi.update('fault_order', order);

    // 设备状态恢复
    const device = await dbApi.get('device_archive', order.device_id);
    if (device.status === 'fault') {
      device.status = 'in_use';
      await dbApi.update('device_archive', device);
    }
    await services.logLifecycle(order.device_id, 'repair', '故障修复',
      `${device.device_name}：${order.fault_desc}；维修费用 ${fmtMoney(cost)}`,
      user.username, Number(cost));
    await services.log(user.username, 'CLOSE_FAULT', device.device_code, '关闭工单：'+order.fault_desc);
    Toast.success('工单已关闭');
    onSaved();
  };

  return (
    <Modal open title="处理维修工单" onClose={onClose} width="500px"
      footer={<><Btn onClick={onClose}>取消</Btn><Btn type="success" onClick={submit}>关闭工单</Btn></>}>
      <div className="space-y-3 text-sm">
        <div className="bg-gray-50 border rounded p-3">
          <div><b>设备：</b>{order.device?.device_name}</div>
          <div className="text-xs text-gray-500 mt-1">{order.device?.device_code}</div>
          <div className="mt-2"><b>故障：</b>{order.fault_desc}</div>
          <div className="text-xs text-gray-500">报修日期：{order.report_date}</div>
        </div>
        <Field type="number" label="维修费用" value={cost} onChange={setCost}/>
        <Field type="number" label="停机时长（小时）" value={hours} onChange={setHours}/>
      </div>
    </Modal>
  );
}

function CreatePurchaseModal({ bridges, onClose, onSaved }) {
  const { user } = useApp();
  const [category, setCategory] = useState('SUP_CABLE');
  const [qty, setQty] = useState(1);
  const [price, setPrice] = useState(50000);
  const [supplier, setSupplier] = useState('柳州欧维姆机械股份有限公司');
  const [bridgeId, setBridgeId] = useState(bridges[0]?.id || '');

  const submit = async () => {
    if (Number(qty) <= 0 || Number(price) <= 0) { Toast.error('数量和单价必须大于零'); return; }
    const orderNo = 'PO-' + new Date().getFullYear() + '-' + String(Math.floor(Math.random()*9000)+1000);
    await dbApi.insert('purchase_order', {
      id:uid(), order_no:orderNo, category, quantity:Number(qty), unit_price:Number(price),
      total_amount: Number(qty) * Number(price), supplier, bridge_id:bridgeId,
      order_date:today(), order_user:user.username,
      status:'pending', receive_date:null, receive_user:null,
      create_time:now()
    });
    await services.log(user.username, 'CREATE_PURCHASE', orderNo,
      `${category} × ${qty}，金额 ${fmtMoney(Number(qty)*Number(price))}`);
    Toast.success('采购订单已创建');
    onSaved();
  };

  return (
    <Modal open title="新建采购订单" onClose={onClose} width="520px"
      footer={<><Btn onClick={onClose}>取消</Btn><Btn type="primary" onClick={submit}>提交订单</Btn></>}>
      <div className="space-y-3">
        <SelectField label="设备品类*" value={category} onChange={setCategory}
          options={DEVICE_CATEGORIES.map(c => ({v:c.code, l:c.name}))}/>
        <div className="grid grid-cols-2 gap-3">
          <Field type="number" label="数量*" value={qty} onChange={setQty}/>
          <Field type="number" label="单价 (¥)*" value={price} onChange={setPrice}/>
        </div>
        <Field label="供应商*" value={supplier} onChange={setSupplier}/>
        <SelectField label="目标桥梁*" value={bridgeId} onChange={setBridgeId}
          options={bridges.map(b => ({v:b.id, l:b.bridge_name}))}/>
        <div className="text-sm bg-blue-50 border border-blue-200 rounded p-3">
          <div>预计总额：<b className="text-blue-700">{fmtMoney(Number(qty) * Number(price))}</b></div>
          <div className="text-xs text-gray-500 mt-1">订单创建后状态为「待发货」，可手动推进到「运输中」「已入库」</div>
        </div>
      </div>
    </Modal>
  );
}

function ScrapPage() {
  const { user } = useApp();
  const [devices, setDevices] = useState([]);
  const [bridges, setBridges] = useState([]);
  const [decisions, setDecisions] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [tab, setTab] = useState('candidate'); // candidate | history

  const reload = async () => {
    const allDev = await dbApi.all('device_archive');
    setDevices(allDev);
    setBridges(await dbApi.all('bridge'));
    const dec = await dbApi.all('scrap_decision');
    dec.sort((a,b) => (b.create_time||'').localeCompare(a.create_time||''));
    setDecisions(dec);
  };
  useEffect(() => { reload(); }, []);

  // 候选清单：使用中或故障中、且年龄超过 60% 设计寿命，或残值率低于阈值
  const candidates = devices.filter(d => {
    if (d.status === 'scrapped') return false;
    const cat = DEVICE_CATEGORIES.find(c => c.code === d.category);
    if (!cat) return false;
    const ageY = ((new Date() - new Date(d.commission_date)) / (365*86400*1000));
    const ratio = ageY / cat.designLife;
    const decided = decisions.find(x => x.device_id === d.id && x.status !== 'rejected');
    return ratio >= 0.6 && !decided;
  }).sort((a,b) => {
    const ca = DEVICE_CATEGORIES.find(c => c.code === a.category);
    const cb = DEVICE_CATEGORIES.find(c => c.code === b.category);
    const ratioA = ((new Date() - new Date(a.commission_date))/(365*86400*1000)) / (ca?.designLife||10);
    const ratioB = ((new Date() - new Date(b.commission_date))/(365*86400*1000)) / (cb?.designLife||10);
    return ratioB - ratioA;
  });

  if (activeId) {
    const dev = devices.find(d => d.id === activeId);
    return <ScrapDetailPage device={dev} bridges={bridges} onBack={() => { setActiveId(null); reload(); }}/>;
  }

  return (
    <div className="p-6 space-y-4">
      <div>
        <h2 className="text-2xl font-bold text-gray-800">报废技术鉴定</h2>
        <p className="text-sm text-gray-500 mt-1">基于 TCO 模型对临近寿命的设备进行技术经济评估</p>
      </div>

      <div className="grid grid-cols-4 gap-4">
        <StatCard title="待鉴定" value={candidates.length} sub="超过 60% 设计寿命" color="amber"/>
        <StatCard title="鉴定中" value={decisions.filter(d => d.status==='pending').length} sub="等待审批" color="blue"/>
        <StatCard title="已批准报废" value={decisions.filter(d => d.status==='approved').length} sub="实际报废" color="red"/>
        <StatCard title="已驳回" value={decisions.filter(d => d.status==='rejected').length} sub="继续使用" color="gray"/>
      </div>

      <div className="bg-white rounded-lg shadow border">
        <div className="border-b flex">
          <button onClick={() => setTab('candidate')}
            className={`px-5 py-3 text-sm border-b-2 ${tab==='candidate' ? 'border-red-500 text-red-600 font-semibold' : 'border-transparent text-gray-500'}`}>
            待鉴定清单 ({candidates.length})
          </button>
          <button onClick={() => setTab('history')}
            className={`px-5 py-3 text-sm border-b-2 ${tab==='history' ? 'border-red-500 text-red-600 font-semibold' : 'border-transparent text-gray-500'}`}>
            鉴定历史 ({decisions.length})
          </button>
        </div>

        {tab === 'candidate' ?
          <table className="w-full text-sm">
            <thead className="bg-gray-50 text-gray-600 text-xs">
              <tr>
                <th className="text-left px-3 py-2">设备编号</th>
                <th className="text-left px-3 py-2">名称</th>
                <th className="text-left px-3 py-2">所属桥梁</th>
                <th className="text-left px-3 py-2">分类</th>
                <th className="text-center px-3 py-2">投运</th>
                <th className="text-center px-3 py-2">使用率</th>
                <th className="text-center px-3 py-2">残值估算</th>
                <th className="text-center px-3 py-2">状态</th>
                <th className="text-center px-3 py-2">操作</th>
              </tr>
            </thead>
            <tbody>
              {candidates.length === 0 ?
                <tr><td colSpan="9" className="text-center py-8 text-gray-400">无待鉴定设备</td></tr> :
                candidates.map(d => {
                  const cat = DEVICE_CATEGORIES.find(c => c.code === d.category);
                  const br = bridges.find(b => b.id === d.bridge_id);
                  const ageY = ((new Date() - new Date(d.commission_date))/(365*86400*1000));
                  const ratio = ageY / (cat?.designLife||10);
                  const residual = services.calcResidual(d);
                  const ratioColor = ratio >= 1.0 ? 'text-red-600 font-bold' : ratio >= 0.85 ? 'text-orange-600 font-semibold' : 'text-amber-600';
                  return (
                    <tr key={d.id} className="border-t hover:bg-gray-50">
                      <td className="px-3 py-2 font-mono text-xs">{d.device_code}</td>
                      <td className="px-3 py-2">{d.device_name}</td>
                      <td className="px-3 py-2">{br?.bridge_name || '-'}</td>
                      <td className="px-3 py-2 text-xs">{cat?.name}</td>
                      <td className="text-center px-3 py-2 text-xs">{d.commission_date}</td>
                      <td className={`text-center px-3 py-2 ${ratioColor}`}>{(ratio*100).toFixed(0)}%</td>
                      <td className="text-center px-3 py-2 text-xs">{fmtMoney(residual)}</td>
                      <td className="text-center px-3 py-2"><Tag status={d.status}/></td>
                      <td className="text-center px-3 py-2">
                        <button onClick={() => setActiveId(d.id)}
                          className="text-xs text-red-600 hover:underline font-medium">技术鉴定</button>
                      </td>
                    </tr>
                  );
                })
              }
            </tbody>
          </table>
        :
          <table className="w-full text-sm">
            <thead className="bg-gray-50 text-gray-600 text-xs">
              <tr>
                <th className="text-left px-3 py-2">鉴定日期</th>
                <th className="text-left px-3 py-2">设备</th>
                <th className="text-left px-3 py-2">鉴定结论</th>
                <th className="text-right px-3 py-2">建议方案</th>
                <th className="text-center px-3 py-2">鉴定人</th>
                <th className="text-center px-3 py-2">状态</th>
              </tr>
            </thead>
            <tbody>
              {decisions.length === 0 ?
                <tr><td colSpan="6" className="text-center py-8 text-gray-400">暂无记录</td></tr> :
                decisions.map(dc => {
                  const dev = devices.find(d => d.id === dc.device_id);
                  const stColor = dc.status === 'approved' ? 'bg-red-100 text-red-700' :
                    dc.status === 'rejected' ? 'bg-gray-200 text-gray-600' : 'bg-amber-100 text-amber-700';
                  return (
                    <tr key={dc.id} className="border-t hover:bg-gray-50">
                      <td className="px-3 py-2 text-xs">{dc.decision_date}</td>
                      <td className="px-3 py-2">{dev?.device_name} <span className="text-xs text-gray-400">{dev?.device_code}</span></td>
                      <td className="px-3 py-2 text-xs max-w-md truncate">{dc.conclusion}</td>
                      <td className="text-right px-3 py-2 text-xs">
                        <span className={dc.recommendation === 'replace' ? 'text-red-600 font-semibold' : 'text-blue-600'}>
                          {dc.recommendation === 'replace' ? '更换报废' : '继续维修'}
                        </span>
                      </td>
                      <td className="text-center px-3 py-2 text-xs">{dc.decision_user}</td>
                      <td className="text-center px-3 py-2">
                        <span className={`text-xs px-2 py-0.5 rounded ${stColor}`}>
                          {dc.status === 'approved' ? '已批准' : dc.status === 'rejected' ? '已驳回' : '待审批'}
                        </span>
                      </td>
                    </tr>
                  );
                })
              }
            </tbody>
          </table>
        }
      </div>
    </div>
  );
}

function ScrapDetailPage({ device, bridges, onBack }) {
  const { user } = useApp();
  const [tco, setTco] = useState(null);
  const [repairCost, setRepairCost] = useState(0);
  const [targetYears, setTargetYears] = useState(3);
  const [conclusion, setConclusion] = useState('');
  const [recommendation, setRecommendation] = useState('replace');
  const [loading, setLoading] = useState(true);

  const cat = DEVICE_CATEGORIES.find(c => c.code === device.category);
  const br = bridges.find(b => b.id === device.bridge_id);
  const ageY = ((new Date() - new Date(device.commission_date))/(365*86400*1000));
  const ratio = ageY / (cat?.designLife||10);
  const residual = services.calcResidual(device);

  const recompute = async (rc, ty) => {
    setLoading(true);
    const result = await services.tcoDecision(device.id, ty, rc);
    setTco(result);
    if (result?.recommendation) setRecommendation(result.recommendation);
    if (result?.conclusion && !conclusion) setConclusion(result.conclusion);
    setLoading(false);
  };

  useEffect(() => {
    // 默认估算修复费用：年维修费 × 1.5
    const initRC = Math.max(50000, Math.round((device.annual_repair_cost || 5000) * 1.5));
    setRepairCost(initRC);
    recompute(initRC, 3);
  }, []);

  const submitDecision = async () => {
    if (!conclusion.trim()) { Toast.error('请填写鉴定结论'); return; }
    const decId = uid();
    await dbApi.insert('scrap_decision', {
      id: decId,
      device_id: device.id,
      decision_date: today(),
      decision_user: user.username,
      tco_repair: tco?.repair?.tco || 0,
      tco_replace: tco?.replace?.tco || 0,
      residual_value: residual,
      target_years: targetYears,
      repair_estimate: Number(repairCost),
      conclusion,
      recommendation,
      status: 'pending',
      create_time: now()
    });
    // 待审批
    await dbApi.insert('scrap_approval', {
      id: uid(),
      decision_id: decId,
      status: 'pending',
      approve_user: null,
      approve_date: null,
      approve_comment: null,
      create_time: now()
    });
    await services.log(user.username, 'SCRAP_DECISION', device.device_code,
      `结论：${recommendation === 'replace' ? '建议报废更换' : '建议继续维修'}`);
    Toast.success('鉴定结论已提交，等待管理员审批');
    onBack();
  };

  return (
    <div className="p-6">
      <button onClick={onBack} className="text-sm text-gray-500 hover:text-blue-600 mb-3">← 返回鉴定列表</button>
      <h2 className="text-2xl font-bold text-gray-800 mb-1">报废技术鉴定</h2>
      <p className="text-sm text-gray-500 mb-4">基于 TCO 全寿命成本模型分析「修」与「换」的经济性差异</p>

      {ratio >= 1.0 &&
        <div className="bg-red-50 border-l-4 border-red-500 p-4 mb-4 rounded">
          <div className="font-semibold text-red-700">⚠ 寿命警戒</div>
          <div className="text-sm text-red-600 mt-1">该设备已超过设计使用寿命（{(ratio*100).toFixed(0)}%），强烈建议报废更换以避免安全风险</div>
        </div>
      }

      <div className="grid grid-cols-3 gap-4">
        {/* 左 1/3 - 设备基本信息 */}
        <div className="space-y-4">
          <div className="bg-white rounded-lg shadow border p-4">
            <div className="text-sm font-bold text-gray-700 mb-3 border-b pb-2">设备信息</div>
            <div className="space-y-2 text-sm">
              <div className="flex justify-between"><span className="text-gray-500">编号</span><span className="font-mono text-xs">{device.device_code}</span></div>
              <div className="flex justify-between"><span className="text-gray-500">名称</span><span>{device.device_name}</span></div>
              <div className="flex justify-between"><span className="text-gray-500">分类</span><span>{cat?.name}</span></div>
              <div className="flex justify-between"><span className="text-gray-500">所属桥梁</span><span>{br?.bridge_name}</span></div>
              <div className="flex justify-between"><span className="text-gray-500">投运日期</span><span>{device.commission_date}</span></div>
              <div className="flex justify-between"><span className="text-gray-500">已用年限</span><span className="font-semibold">{ageY.toFixed(1)} 年</span></div>
              <div className="flex justify-between"><span className="text-gray-500">设计寿命</span><span>{cat?.designLife} 年</span></div>
              <div className="flex justify-between"><span className="text-gray-500">使用率</span>
                <span className={ratio >= 1.0 ? 'text-red-600 font-bold' : 'text-amber-600 font-semibold'}>{(ratio*100).toFixed(0)}%</span>

              <div className="flex justify-between"><span className="text-gray-500">购置价</span><span>{fmtMoney(device.purchase_price)}</span></div>

                <div className="bg-amber-50 border border-amber-200 rounded p-3">

                    <b>差额分析：</b>

                      <>更换比维修多花 <b>{fmtMoney(Math.abs(tco.diff))}</b>，但新设备可服役 {cat?.designLife} 年</> :

            }

        </div>

        {/* 右 1/3 - 鉴定结论提交 */}
        <div className="space-y-4">
          <div className="bg-white rounded-lg shadow border p-4">
            <div className="text-sm font-bold text-gray-700 mb-3 border-b pb-2">鉴定结论</div>
            <div className="space-y-3">
              <div>
                <label className="text-sm text-gray-600 mb-1 block">建议方案</label>
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={() => setRecommendation('repair')}
                    className={`py-2 rounded border text-sm ${recommendation==='repair' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white border-gray-300 text-gray-700'}`}>
                    继续维修
                  </button>
                  <button onClick={() => setRecommendation('replace')}
                    className={`py-2 rounded border text-sm ${recommendation==='replace' ? 'bg-red-600 text-white border-red-600' : 'bg-white border-gray-300 text-gray-700'}`}>
                    报废更换
                  </button>
                </div>
              </div>
              <TextareaField label="鉴定意见 *" value={conclusion} onChange={setConclusion}/>
              <div className="text-xs text-gray-500 bg-gray-50 rounded p-2">
                提交后将进入待审批状态，由系统管理员最终批准
              </div>
              <Btn type="danger" onClick={submitDecision}>提交鉴定结论</Btn>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// =============================================================================
// ConfigPage - 阈值参数配置（管理员）
// =============================================================================
function ConfigPage() {
  const { user } = useApp();
  const [cfg, setCfg] = useState({});
  const [loading, setLoading] = useState(true);

  const reload = async () => {
    const all = await dbApi.all('sys_config');
    const map = {};
    all.forEach(c => map[c.key] = c.value);
    setCfg(map);
    setLoading(false);
  };
  useEffect(() => { reload(); }, []);

  const updateConfig = async (key, val, label) => {
    const exist = await dbApi.get('sys_config', key);
    if (exist) {
      exist.value = val;
      exist.update_time = now();
      exist.update_user = user.username;
      await dbApi.update('sys_config', exist);
    } else {
      await dbApi.insert('sys_config', { key, value: val, label,
        update_time: now(), update_user: user.username });
    }
    await services.log(user.username, 'UPDATE_CONFIG', key, `新值: ${val}`);
    setCfg({ ...cfg, [key]: val });
    Toast.success(label + ' 已更新');
  };

  if (loading) return <div className="p-6 text-gray-500">加载中...</div>;

  const sliders = [
    {
      key: 'repair_residual_threshold',
      label: '修复成本/残值阈值',
      desc: '当「修复一次性投入 ≥ 残值 × 该比例」时触发更换建议',
      min: 0.30, max: 0.80, step: 0.05,
      default: 0.60,
      format: v => (v*100).toFixed(0) + '%'
    },
    {
      key: 'life_warning_ratio',
      label: '寿命警戒阈值',
      desc: '当设备使用年限 / 设计寿命 ≥ 该比例时进入「寿命警戒」状态',
      min: 0.60, max: 0.95, step: 0.05,
      default: 0.85,
      format: v => (v*100).toFixed(0) + '%'
    },
    {
      key: 'market_discount_ratio',
      label: '市场折扣系数',
      desc: '残值估算 = 直线折旧值 × 该系数，反映二手市场流动性',
      min: 0.50, max: 1.00, step: 0.05,
      default: 0.80,
      format: v => (v*100).toFixed(0) + '%'
    }
  ];

  return (
    <div className="p-6 space-y-4">
      <div>
        <h2 className="text-2xl font-bold text-gray-800">阈值参数配置</h2>
        <p className="text-sm text-gray-500 mt-1">配置 TCO 决策模型的关键阈值参数（仅管理员可见）</p>
      </div>

      <div className="bg-white rounded-lg shadow border divide-y">
        {sliders.map(s => {
          const cur = cfg[s.key] != null ? Number(cfg[s.key]) : s.default;
          return (
            <div key={s.key} className="p-5">
              <div className="flex justify-between items-baseline mb-1">
                <div>
                  <div className="font-semibold text-gray-800">{s.label}</div>
                  <div className="text-xs text-gray-500 mt-1">{s.desc}</div>
                </div>
                <div className="text-2xl font-bold text-blue-600">{s.format(cur)}</div>
              </div>
              <div className="mt-4 flex items-center gap-3">
                <span className="text-xs text-gray-500 w-12 text-right">{s.format(s.min)}</span>
                <input type="range" min={s.min} max={s.max} step={s.step} value={cur}
                  onChange={e => updateConfig(s.key, Number(e.target.value), s.label)}
                  className="flex-1 accent-blue-600 cursor-pointer"/>
                <span className="text-xs text-gray-500 w-12">{s.format(s.max)}</span>
              </div>
              <div className="text-xs text-gray-400 mt-2">
                取值范围：{s.format(s.min)} ~ {s.format(s.max)} ｜ 默认：{s.format(s.default)}
              </div>
            </div>
          );
        })}
      </div>

      <div className="bg-amber-50 border border-amber-200 rounded p-3 text-sm text-amber-700">
        💡 修改阈值会即时影响后续 TCO 决策结果与寿命警戒提示，但不会改变历史鉴定记录
      </div>
    </div>
  );
}

    const list = await dbApi.all('sys_user');
    list.sort((a,b) => (a.username||'').localeCompare(b.username||''));
    setUsers(list);

  useEffect(() => { reload(); }, []);

  const toggleStatus = async (u) => {
    if (u.username === currentUser.username) { Toast.error('不能禁用自己的账户'); return; }
    u.status = u.status === 1 ? 0 : 1;
    await dbApi.update('sys_user', u);
    await services.log(currentUser.username, 'TOGGLE_USER', u.username, '状态：'+u.status);
    Toast.success('已更新');
    reload();
  };

  const resetPwd = async (u) => {

    u.password = hashPwd('123456');
    u.update_time = now();
    await dbApi.update('sys_user', u);

function UserEditModal({ user, onClose, onSaved }) {
  const { user: currentUser } = useApp();
  const editing = !!user;
  const [username, setUsername] = useState(user?.username || '');
  const [realName, setRealName] = useState(user?.real_name || '');
  const [phone, setPhone] = useState(user?.phone || '');
  const [roleCode, setRoleCode] = useState(user?.role_code || 'maintainer');
  const [password, setPassword] = useState('');

  const submit = async () => {
    if (!username.trim() || !realName.trim()) { Toast.error('请填写账号和姓名'); return; }
    if (!editing && !password.trim()) { Toast.error('新建账户必须设置密码'); return; }

    if (editing) {
      user.real_name = realName;
      user.phone = phone;
      user.role_code = roleCode;
      if (password.trim()) user.password = hashPwd(password);
      user.update_time = now();
      await dbApi.update('sys_user', user);
      await services.log(currentUser.username, 'UPDATE_USER', username, '资料更新');
      Toast.success('已更新');
    } else {
      // 检查重复
      const all = await dbApi.all('sys_user');
      if (all.some(x => x.username === username.trim())) {
        Toast.error('账号已存在'); return;
      }
      await dbApi.insert('sys_user', {
        id: uid(), username: username.trim(),
        password: hashPwd(password),
        real_name: realName, phone, role_code: roleCode,
        status: 1, last_login_at: null,
        create_time: now(), update_time: now()
      });
      await services.log(currentUser.username, 'CREATE_USER', username, '新增 '+roleCode);
      Toast.success('已创建');
    }
    onSaved();
  };

  return (
    <Modal open title={editing ? '编辑账户' : '新建账户'} onClose={onClose} width="480px"
      footer={<><Btn onClick={onClose}>取消</Btn><Btn type="primary" onClick={submit}>保存</Btn></>}>
      <div className="space-y-3">
        <Field label="账号*" value={username} onChange={setUsername} disabled={editing}/>
        <Field label="姓名*" value={realName} onChange={setRealName}/>
        <Field label="手机号" value={phone} onChange={setPhone}/>
        <SelectField label="角色*" value={roleCode} onChange={setRoleCode}
          options={ROLES.map(r => ({v:r.code, l:r.name}))}/>
        <Field type="password" label={editing ? '新密码（留空则不修改）' : '初始密码*'}
          value={password} onChange={setPassword}/>
      </div>
    </Modal>
  );
}

  const [logs, setLogs] = useState([]);
  const [filter, setFilter] = useState('');
  const [actionFilter, setActionFilter] = useState('');

  const reload = async () => {
    const list = await dbApi.all('sys_audit_log');
    list.sort((a,b) => (b.create_time||'').localeCompare(a.create_time||''));
    setLogs(list.slice(0, 500));
  };
  useEffect(() => { reload(); }, []);

  const filtered = logs.filter(l => {
    if (filter && !(l.username||'').includes(filter) && !(l.target||'').includes(filter)) return false;
    if (actionFilter && l.action !== actionFilter) return false;
    return true;
  });

  const actions = [...new Set(logs.map(l => l.action))].sort();

  return (
    <div className="p-6 space-y-4">
      <div>
        <h2 className="text-2xl font-bold text-gray-800">审计日志</h2>
        <p className="text-sm text-gray-500 mt-1">所有写操作均会记录到审计表，便于责任追溯（最多展示最近 500 条）</p>
      </div>

      <div className="bg-white rounded-lg shadow border">
        <div className="px-4 py-3 border-b flex gap-3 items-center">
          <input type="text" placeholder="搜索用户名 / 目标..." value={filter}
            onChange={e => setFilter(e.target.value)}
            className="flex-1 px-3 py-1.5 border rounded text-sm"/>
          <select value={actionFilter} onChange={e => setActionFilter(e.target.value)}
            className="px-3 py-1.5 border rounded text-sm">
            <option value="">全部操作类型</option>
            {actions.map(a => <option key={a} value={a}>{a}</option>)}
          </select>
          <span className="text-xs text-gray-500">共 {filtered.length} 条</span>
        </div>
        <table className="w-full text-sm">
          <thead className="bg-gray-50 text-gray-600 text-xs">
            <tr>
              <th className="text-left px-3 py-2 w-44">时间</th>
              <th className="text-left px-3 py-2 w-32">用户</th>
              <th className="text-left px-3 py-2 w-36">操作</th>
              <th className="text-left px-3 py-2 w-44">对象</th>
              <th className="text-left px-3 py-2">详情</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 ?
              <tr><td colSpan="5" className="text-center py-8 text-gray-400">无日志</td></tr> :
              filtered.map(l =>
                <tr key={l.id} className="border-t hover:bg-gray-50">
                  <td className="px-3 py-2 text-xs font-mono">{(l.create_time||'').slice(0,19).replace('T',' ')}</td>
                  <td className="px-3 py-2 text-xs font-semibold text-blue-600">{l.username}</td>
                  <td className="px-3 py-2 text-xs">
                    <span className="px-2 py-0.5 bg-blue-50 text-blue-700 rounded">{l.action}</span>
                  </td>
                  <td className="px-3 py-2 text-xs text-gray-600">{l.target || '-'}</td>
                  <td className="px-3 py-2 text-xs text-gray-500">{l.detail || '-'}</td>
                </tr>
              )
            }
          </tbody>
        </table>
      </div>
    </div>
  );
}


// =============================================================================
// TopBar - 顶部状态条
// =============================================================================
function TopBar() {
  const { user, logout } = useApp();
  const role = ROLES.find(r => r.code === user.role_code);
  const [now2, setNow2] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => setNow2(new Date()), 1000);
    return () => clearInterval(t);
  }, []);
  return (
    <div className="bg-white border-b h-14 px-6 flex items-center justify-between">
      <div className="text-sm text-gray-500">
        🌉 桥梁设备全生命周期管理系统
      </div>
      <div className="flex items-center gap-5">
        <span className="text-xs text-gray-500 font-mono">
          {now2.toLocaleString('zh-CN', { hour12: false })}
        </span>
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white text-xs font-bold">
            {(user.real_name || user.username).slice(0,1)}
          </div>
          <div className="text-sm">
            <div className="font-semibold text-gray-700">{user.real_name || user.username}</div>
            <div className="text-xs text-gray-400">
              <span className={`px-1.5 py-0.5 rounded text-xs ${role?.color}`}>{role?.name}</span>
            </div>
          </div>
          <button onClick={() => { if (confirm('确定要退出登录吗？')) logout(); }}
            className="ml-2 text-xs text-gray-500 hover:text-red-600 px-2 py-1">退出</button>
        </div>
      </div>
    </div>
  );
}

// =============================================================================
// MainLayout - 已登录后的主框架
// =============================================================================
function MainLayout() {
  const { menu } = useApp();
  return (
    <div className="h-screen flex bg-gray-50">
      <Sidebar/>
      <div className="flex-1 flex flex-col overflow-hidden">
        <TopBar/>
        <div className="flex-1 overflow-y-auto">
          {menu === 'dashboard' && <DashboardPage/>}
          {menu === 'lifecycle' && <LifecyclePage/>}
          {menu === 'bridges' && <BridgesPage/>}
          {menu === 'devices' && <DevicesPage/>}
          {menu === 'maintain' && <MaintainPage/>}
          {menu === 'fault' && <FaultPage/>}
          {menu === 'purchase' && <PurchasePage/>}
          {menu === 'scrap' && <ScrapPage/>}
          {menu === 'stats' && <StatsPage/>}
          {menu === 'config' && <ConfigPage/>}
          {menu === 'users' && <UsersPage/>}
          {menu === 'audit' && <AuditPage/>}
        </div>

// =============================================================================
// App - 根组件
// =============================================================================
function App() {
  const [user, setUser] = useState(null);
  const [menu, setMenu] = useState('dashboard');
  const [ready, setReady] = useState(false);

  useEffect(() => {
    (async () => {
      await openDB();
      await seedDataIfEmpty();
      // 尝试从 sessionStorage 恢复登录态
      try {
        const cached = sessionStorage.getItem('bridge_user');
        if (cached) {
          const u = JSON.parse(cached);
          // 验证账户仍存在且未禁用
          const fresh = await dbApi.all('sys_user');
          const found = fresh.find(x => x.username === u.username && x.status === 1);
          if (found) setUser(found);
        }
      } catch (e) { /* 忽略 */ }
      setReady(true);
    })();
  }, []);

  const login = async (username, password) => {
    const all = await dbApi.all('sys_user');
    const u = all.find(x => x.username === username.trim());
    if (!u) { Toast.error('账号不存在'); return false; }
    if (u.status !== 1) { Toast.error('账户已被禁用，请联系管理员'); return false; }
    if (u.password !== hashPwd(password)) { Toast.error('密码错误'); return false; }
    u.last_login_at = now();
    await dbApi.update('sys_user', u);
    await services.log(u.username, 'LOGIN', '系统', '登录成功');
    try { sessionStorage.setItem('bridge_user', JSON.stringify(u)); } catch(e) {}
    setUser(u);
    setMenu('dashboard');
    Toast.success('欢迎，' + (u.real_name || u.username));
    return true;
  };

  const logout = async () => {
    if (user) await services.log(user.username, 'LOGOUT', '系统', '退出登录');
    try { sessionStorage.removeItem('bridge_user'); } catch(e) {}
    setUser(null);
  };

  if (!ready) {
    return (
      <div className="h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-indigo-800">
        <div className="text-white text-center">
          <div className="text-4xl mb-4">🌉</div>
          <div className="text-lg">桥梁设备全生命周期管理系统</div>
          <div className="text-sm opacity-80 mt-2">正在初始化数据库...</div>
        </div>
      </div>
    );
  }

  return (
    <AppContext.Provider value={{ user, setUser, menu, setMenu, login, logout }}>
      <ToastContainer/>
      {user ? <MainLayout/> : <LoginPage onLogin={(u) => { try { sessionStorage.setItem('bridge_user', JSON.stringify(u)); } catch(e) {}; setUser(u); setMenu('dashboard'); }}/>}
    </AppContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>
</body>
</html>
